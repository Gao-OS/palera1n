name: Build jbinit

on:
  push:
    paths:
      - 'jbinit/**'
      - 'loader/**'
      - '.github/workflows/jbinit-build.yml'
  pull_request:
    paths:
      - 'jbinit/**'
      - 'loader/**'
      - '.github/workflows/jbinit-build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select correct Xcode
        uses: mobiledevops/xcode-select-version-action@v1
        with:
          xcode-select-version: 16.4

      - name: Install dependencies (packages)
        run: |
          brew install make gnu-sed ldid-procursus fakeroot

      - name: Build loader (iOS and tvOS)
        run: |
          make loader-all

      - name: Copy loader IPAs to jbinit
        working-directory: jbinit/src
        run: |
          cp ../../loader/packages/palera1nLoader.ipa .
          cp ../../loader/packages/palera1nLoaderTV.ipa .

      - name: Download binpack.tar
        working-directory: jbinit/src
        env:
          DEPS_TAG: deps-v1
          DEPS_REPO: Gao-OS/palera1n
        run: |
          curl -Lfo binpack.tar "https://github.com/${DEPS_REPO}/releases/download/${DEPS_TAG}/binpack.tar"

      - name: Compile (Release)
        working-directory: jbinit
        run: |
          gmake -j1 tools
          gmake -j$(sysctl -n hw.ncpu)

      - name: Prepare for upload (Release)
        run: |
          mkdir -p dist
          cp jbinit/src/ramdisk.dmg dist/ramdisk.dmg
          cp jbinit/src/binpack.dmg dist/binpack.dmg

      - name: Compile (Development)
        working-directory: jbinit
        run: |
          gmake clean
          gmake -j$(sysctl -n hw.ncpu) DEV_BUILD=1

      - name: Prepare for upload (Development)
        run: |
          cp jbinit/src/ramdisk.dmg dist/ramdisk.development.dmg
          cp jbinit/src/binpack.dmg dist/binpack.development.dmg

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: jbinit-artifacts
          path: dist/
          retention-days: 30
